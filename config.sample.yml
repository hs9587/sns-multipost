# config.yml にコピーして記入する。config.yml は .gitignore 済み（コミットされない）

fedibird:
  base_url: https://fedibird.com
  access_token: "Fedibird の 設定 > 開発 で作成したアクセストークン"
  account_id: "自分のアカウントID（数字）。ruby bin/whoami で確認できる"

# 投稿先。ポスター実装済みの SNS だけ並べる（Phase 1 は fedibird のみ）
targets:
  - fedibird

# true にすると投稿直前で止まる（実投稿しない）
dry_run: true
