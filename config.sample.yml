# config.yml にコピーして記入する。config.yml は .gitignore 済み（コミットされない）

fedibird:
  base_url: https://fedibird.com
  access_token: "Fedibird の 設定 > 開発 で作成したアクセストークン"
  account_id: "自分のアカウントID（数字）。ruby bin/whoami で確認できる"

bluesky:
  handle: "you.bsky.social"      # あなたのハンドル
  app_password: ""               # 設定 > プライバシーとセキュリティ > アプリパスワード で発行

tumblr:
  access_token: ""               # Tumblr の OAuth2 アクセストークン
  blog_identifier: "you.tumblr.com"  # 投稿先ブログ（例 you.tumblr.com）

blogger:
  client_id: ""                  # Google Cloud の OAuth2 クライアントID
  client_secret: ""              # 同シークレット
  refresh_token: ""              # scope=blogger の refresh token
  blog_id: ""                    # Blogger のブログID（数字）

# 投稿先。ポスター実装済みで、かつ認証情報を記入した SNS だけ並べる
targets:
  - fedibird
  - bluesky
  - tumblr
  - blogger

# true にすると投稿直前で止まる（実投稿しない）
dry_run: true
