# タイトル辞書。上のセクションほど優先。「ドライラン＋指摘」で育てる
ohayo:
  keywords: [おはよう]
  title: おはよう

coffee:
  vocab: [コーヒー, 珈琲, ホット, アイス, アメリカン, ブレンド, ブリュー,
          モカ, キリマンジャロ, マンデリン, グアテマラ, エチオピア, コロンビア]
  # アイス/ホットは温度の修飾語で単独ではコーヒーと断定できない。
  # 非コーヒー飲料語が同居するときはコーヒー判定しない（アイスティー等をよける）
  modifiers: [アイス, ホット]
  iced: [アイス, コールド]
  brands: [モカ, キリマンジャロ, マンデリン, グアテマラ, エチオピア, コロンビア,
           ブレンド, アメリカン]
  non_coffee_drinks: [ティー, 紅茶, ルイボス, ジュース, ココア, 抹茶, ビール, ワイン]
  shops: [猫廼舎]

# パン・ブレッドは主菜より優先。まず foods_priority を見て、無ければ foods
foods_priority: [パン, ブレッド]
foods: [スパゲティ, そば, うどん, ラーメン, カレー, ごはん, おにぎり]

fallback_length: 12
